spring.application.name=enjambre

# ========== SERVIDOR ==========
server.port=${PORT:8080}

# ========== BASE DE DATOS ==========
spring.jpa.database=mysql
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:${MYSQL_URL}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_ROOT_PASSWORD}

# ========== CORREO ==========
# IMPORTANTE para Railway - Configura estas variables en el Dashboard de Railway:
#   MAIL_HOST     = smtp.gmail.com
#   MAIL_PORT     = 587
#   MAIL_USERNAME = tu_correo@gmail.com
#   MAIL_PASSWORD = tu_contrasena_de_aplicacion_gmail (16 caracteres SIN espacios)
#
# Como generar contrasena de aplicacion Gmail:
#   1. Ve a myaccount.google.com -> Seguridad -> Verificacion en 2 pasos (activar)
#   2. Busca "Contrasenas de aplicaciones" y genera una nueva
#   3. Copia los 16 caracteres SIN espacios como valor de MAIL_PASSWORD
spring.mail.host=${MAIL_HOST:smtp.mailersend.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.ssl.trust=smtp.mailersend.net
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000
spring.mail.default-encoding=UTF-8

# ========== THYMELEAF ==========
spring.thymeleaf.cache=false

# ========== MULTIPART (CARGA DE ARCHIVOS) ==========
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ========== CONFIGURACIÓN MAILERSEND SDK ==========
mailersend.api.token=${MAILERSEND_API_TOKEN:mlsn.cee9b03f881b2bcd1d65fc94caf2026ff36623da6396d68d8cd829a21c0afba5}
